<div class="card-container">
    <p-card header="CODIFICACIÓN" subheader="Sistema de codificación informatizada" [style]="{width: '360px'}"
        styleClass="p-card-shadow">
        <ng-template pTemplate="header">
            <img alt="Card" src="assets/showcase/images/usercard.png">
        </ng-template>

        <div class="p-fluid grid formgrid">
            <div class="field col-12 md:col-12">
                <label for="basic">USUARIO</label>
                <input type="text" pInputText>
            </div>

            <div class="field col-12 md:col-12">
                <label for="basic">CONTRASEÑA</label>
                <input type="text" pInputText>
            </div>

            <div class="field col-12 md:col-12">                
                <p-button (onClick)="verificarUsuario()" label="INGRESAR" icon="pi pi-check"></p-button>
            </div>

        </div>
        <ng-template pTemplate="footer">
            <span class="text-600 font-medium line-height-3">INE - CPV |</span>
                <a class="font-medium no-underline ml-2 text-blue-500 cursor-pointer">Censo-2024</a>

            <!-- <p-button label="Ingresar" icon="pi pi-check"></p-button> -->
            <!-- <p-button label="Cancel" icon="pi pi-times" styleClass="p-button-secondary" [style]="{'margin-left': '.5em'}"></p-button> -->
        </ng-template>
    </p-card>
</div>
